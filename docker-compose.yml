version: "3.9"

services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf

  producer:
    build: .
    command: python producer.py --verbose --host mosquitto
    devices:
      - /dev/gpiochip0:/dev/gpiochip0  # GPIO access
    depends_on:
      - mosquitto

  consumer:
    build: .
    command: python consumer.py --verbose --host mosquitto
    volumes:
      - ./data:/app/data        # persist the JSONL output
    depends_on:
      - mosquitto