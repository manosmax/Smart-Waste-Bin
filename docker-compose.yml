services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - smartbin-net

  producer:
    build: .
    command: python3 producer.py --verbose --host mosquitto
    privileged: true
    devices:
      - /dev/gpiochip0:/dev/gpiochip0
      # - /dev/gpiochip4:/dev/gpiochip4
    volumes:
      - ./data:/app/data
    networks:
      - smartbin-net
    depends_on:
      - mosquitto

  consumer:
    build: .
    command: >
      python consumer.py
      --verbose
      --host mosquitto
      --topic smartbin/bin-01/pir-01/events
      --out /app/data/motion_events.jsonl
    volumes:
      - ./data:/app/data
    networks:
      - smartbin-net
    depends_on:
      - mosquitto

  api:
    build: .
    command: python api.py
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./models_v_s:/app/models_v_s
    environment:
      - MQTT_BROKER=mosquitto
      - DB_PATH=/app/data/smartbin.db
    networks:
      - smartbin-net
    depends_on:
      - mosquitto

  train_model:
    build: .
    command: python train_model.py --output-dir /app/models_v_s --db-path /app/data/smartbin.db
    restart: on-failure
    volumes:
      - ./data:/app/data
      - ./models_v_s:/app/models_v_s
    networks:
      - smartbin-net
    depends_on:
      - mosquitto

  virtual_sensor_rules:
    build: .
    command: python virtual_sensor_rules.py --broker mosquitto
    networks:
      - smartbin-net
    depends_on:
      - mosquitto
      - producer

  virtual_sensor_ml:
    build: .
    command: python virtual_sensor_ml.py --broker mosquitto --model-path /app/models_v_s/busy_predictor.joblib
    volumes:
      - ./models_v_s:/app/models_v_s
    networks:
      - smartbin-net
    depends_on:
      - mosquitto
      - producer

  fictional-sensor:
    build: .
    command: python fictional_sensor.py --bin-id bin-02 --sensor-id pir-02 --host mosquitto
    networks:
      - smartbin-net
    depends_on:
      - mosquitto
    restart: unless-stopped

  upload:
    build: .
    command: python upload.py
    ports:
      - "5001:5001"
    volumes:
      - ./data:/app/data
      - ./models_v_s:/app/models_v_s
    networks:
      - smartbin-net
    depends_on:
      - mosquitto

  asyncapi-docs:
    build: .
    command: python3 serve_yaml.py
    ports:
      - "5002:5002"
    volumes:
      - ./asyncapi.yml:/app/asyncapi.yml:ro
    networks:
      - smartbin-net

  node-red:
    image: nodered/node-red:latest
    ports:
      - "1880:1880"
    volumes:
      - ./node-red:/data           
    environment:
      - TZ=Europe/Athens           
      - NODE_RED_INSTALL_EXTRA_PACKAGES=node-red-dashboard
    networks:
      - smartbin-net
    depends_on:
      - mosquitto
    restart: unless-stopped

homeassistant:
  image: homeassistant/home-assistant:stable
  ports:
    - "8123:8123"
  volumes:
    - ./ha-config:/config   
  environment:
    - TZ=Europe/Athens
  networks:
    - smartbin-net
  depends_on:
    - mosquitto
networks:
  smartbin-net:
    driver: bridge


