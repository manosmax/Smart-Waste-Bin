services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf

  producer:
    build: .
    command: python producer.py --verbose --host mosquitto
    devices:
      - /dev/gpiochip0:/dev/gpiochip0
    depends_on:
      - mosquitto

  consumer:
    build: .
    command: python consumer.py --verbose --host mosquitto --out /app/data/motion_events.jsonl
    volumes:
      - ./data:/app/data
    depends_on:
      - mosquitto